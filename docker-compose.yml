version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: gtu_postgres
    restart: always
    environment:
      POSTGRES_DB: gtu_db
      POSTGRES_USER: gtu_admin
      POSTGRES_PASSWORD: GTU2024Secure
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gtu_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: gtu_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gtu.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - gtu_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  gtu_network:
    driver: bridge
