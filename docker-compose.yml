services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:15
    container_name: gtu_postgres
    restart: always
    environment:
      POSTGRES_DB: gtu_db
      POSTGRES_USER: gtu_admin
      POSTGRES_PASSWORD: GTU2024Secure
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - gtu_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gtu_admin -d gtu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Interfaz gráfica de PostgreSQL
  pgadmin:
    image: dpage/pgadmin4
    container_name: gtu_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gtu.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - gtu_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # Aplicación GTU (Frontend + API)
  app:
    build: .
    container_name: gtu_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=gtu_admin
      - DB_PASSWORD=GTU2024Secure
      - DB_NAME=gtu_db
      - SESSION_SECRET=gtu-production-secret-key
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gtu_network
    volumes:
      - ./public:/app/public
      - ./views:/app/views

volumes:
  postgres_data:
  pgadmin_data:

networks:
  gtu_network:
    driver: bridge