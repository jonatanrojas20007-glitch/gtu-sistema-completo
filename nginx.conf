server {
    listen 80;
    server_name localhost;
    
    # Tipos MIME para .ejs
    types {
        text/html html htm shtml ejs;
        text/css css;
        text/javascript js;
        image/png png;
        image/jpeg jpg jpeg;
        application/json json;
    }
    
    default_type application/octet-stream;
    
    # Servir archivos estáticos
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # Servir archivos .ejs como HTML
    location ~ \.ejs$ {
        root /usr/share/nginx/html;
        add_header Content-Type text/html;
        try_files $uri =404;
    }
    
    # Archivos CSS
    location /css/ {
        alias /usr/share/nginx/html/css/;
    }
    
    # Archivos JS
    location /js/ {
        alias /usr/share/nginx/html/js/;
    }
    
    # API - Redirigir al backend
    location /api/ {
        proxy_pass http://backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # Páginas - servir archivos .ejs
    location /pages/ {
        alias /usr/share/nginx/html/views/pages/;
        add_header Content-Type text/html;
        try_files $uri $uri.ejs =404;
    }
}